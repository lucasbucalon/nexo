<style>
  .profile {
    display: flex;
    flex-direction: column;
  }

  .image {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  img[data-image="foto"] {
    position: relative;
  }

  img[data-image="arte"] {
    position: absolute;
    z-index: -1;
    margin: 0 0 0 80px;
  }

  .efect {
    position: absolute;
    background-color: var(--bg-image);
    filter: blur(30px);
    width: 20%;
    height: 20%;
    border-radius: 100%;
    z-index: -2;
  }

  .name {
    margin: 30px 0;
  }
</style>

<html>
  <section class="profile">
    <div class="image">
      <div class="efect"></div>
      <img
        data-image="arte"
        alt="Foto da arte"
        loading="eager"
        fetchpriority="auto"
        decoding="auto"
      />
      <img
        data-image="foto"
        alt="Foto do perfil"
        loading="eager"
        fetchpriority="high"
        decoding="auto"
      />
    </div>

    <h1 class="name">João Lucas Bucalon</h1>
  </section>
</html>
